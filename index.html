<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>cyberdach | ~/$</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    /* ===== DESIGN TOKENS ===== */
    :root {
      --primary:   #1e1e1e;
      --secondary: #295f4e;
      --accent:    #eb2632;
      --light:     #F5F5F5;
      --muted:     #888;
      --border:    rgba(255,255,255,0.08);
      --mono:      "JetBrains Mono", monospace;
      --sans:      "Space Grotesk", sans-serif;
      --glow:      0 0 12px rgba(235,38,50,0.4);
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--sans);
      background: var(--light);
      color: var(--primary);
      min-height: 100vh;
      overflow-x: hidden;
    }
    a { color: var(--secondary); text-decoration: none; transition: 0.2s; }
    a:hover { color: var(--accent); }

    /* ===== SPA LAYOUT ===== */
    .homepage {
      display: flex;
      min-height: 100vh;
    }

    /* ----- LEFT PANEL (static) ----- */
    .left_panel {
      position: fixed;
      top: 0; left: 0;
      width: 50%;
      height: 100vh;
      background: var(--primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      z-index: 1;
    }
    #three-canvas {
      position: absolute;
      inset: 0;
      width: 100% !important;
      height: 100% !important;
    }
    .left_overlay {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      pointer-events: none;
    }
    .sidebar-name {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.35em;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
    }

    /* ----- TERMINAL PROMPT LOGO ----- */
    .terminal-logo {
      font-family: var(--mono);
      font-size: 1.3rem;
      line-height: 1.4;
      text-align: left;
      background: rgba(20,20,20,0.7);
      backdrop-filter: blur(8px);
      padding: 1.2rem 1.8rem;
      border-radius: 12px;
      border: 1px solid rgba(235,38,50,0.3);
      box-shadow: var(--glow);
      pointer-events: none;
    }
    .prompt-line {
      color: #00ff9d;
      opacity: 0.85;
    }
    .user { color: #ff5555; font-weight: bold; }
    .host { color: #f1fa8c; }
    .path { color: #8be9fd; }
    .cursor-block {
      display: inline-block;
      background: var(--accent);
      color: #0a0a0a;
      font-weight: bold;
      padding: 0 2px;
      margin-left: 4px;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .left-links {
      display: flex;
      gap: 1rem;
      pointer-events: all;
    }
    .left-links a {
      width: 38px; height: 38px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.6);
      background: rgba(255,255,255,0.04);
      transition: all 0.2s;
    }
    .left-links a:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(235,38,50,0.15);
      box-shadow: var(--glow);
    }

    .scroll-quote-container {
      position: absolute;
      bottom: 2rem;
      left: 0; right: 0;
      text-align: center;
      padding: 0 2rem;
      z-index: 2;
    }
    .scroll-quote {
      font-family: var(--mono);
      font-size: 0.62rem;
      color: rgba(255,255,255,0.25);
      line-height: 1.6;
      transition: opacity 0.5s, transform 0.5s;
    }
    .scroll-out { opacity: 0; transform: translateY(6px); }
    .scroll-in  { opacity: 1; transform: translateY(0); }

    /* ----- RIGHT PANEL (dynamic) ----- */
    .right_panel {
      margin-left: 50%;
      width: 50%;
      min-height: 100vh;
      padding: 3rem 3.5rem;
      overflow-y: auto;
      background: var(--light);
    }

    /* Navigation */
    .top-nav {
      display: flex;
      gap: 2rem;
      margin-bottom: 3rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid rgba(30,30,30,0.12);
    }
    .nav-link {
      font-family: var(--mono);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      transition: 0.2s;
    }
    .nav-link:hover,
    .nav-link.active { color: var(--primary); border-bottom: 2px solid var(--accent); padding-bottom: 3px; }

    /* Sections */
    .section-label {
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .section-label::after {
      content: "";
      flex: 1;
      height: 1px;
      background: rgba(30,30,30,0.12);
    }

    /* Cards, tags, etc. (keep existing styles) */
    .hero-content h1 {
      font-size: clamp(1.5rem, 2.5vw, 2rem);
      font-weight: 400;
      line-height: 1.45;
      margin-bottom: 2rem;
    }
    .hero-content h1 strong { font-weight: 700; }
    .metadata-grid {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: 1.5rem;
      margin: 2rem 0;
      padding: 1.5rem;
      background: rgba(30,30,30,0.04);
      border-radius: 10px;
    }
    .meta-item h3 {
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }
    .bio-text p {
      font-size: 0.95rem;
      line-height: 1.8;
      color: #444;
      margin-bottom: 1rem;
    }

    .skill-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; margin: 1rem 0 2rem; }
    .skill-tag {
      font-family: var(--mono);
      font-size: 0.7rem;
      padding: 0.3rem 0.9rem;
      border-radius: 4px;
      border: 1px solid rgba(30,30,30,0.15);
      background: #fff;
    }

    .projects-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .project-card {
      border: 1px solid rgba(30,30,30,0.1);
      border-radius: 10px;
      padding: 1.2rem;
      background: #fff;
      transition: 0.2s;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }
    .project-card:hover {
      border-color: var(--secondary);
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(41,95,78,0.1);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .stat-img { border-radius: 8px; overflow: hidden; background: #1a1a2e; }
    .stat-img img { width:100%; display:block; }

    /* Mobile */
    @media (max-width: 768px) {
      .homepage { flex-direction: column; }
      .left_panel { position: relative; width:100%; height:50vh; min-height:300px; }
      .right_panel { margin-left:0; width:100%; padding:2rem 1.5rem; }
      .projects-grid { grid-template-columns:1fr; }
      .metadata-grid { grid-template-columns:1fr; }
    }

    /* Fade animation for view changes */
    .fade-transition { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity:0.5; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body>
<div class="homepage">

  <!-- ========== LEFT PANEL (STATIC) ========== -->
  <div class="left_panel">
    <canvas id="three-canvas"></canvas>
    <div class="left_overlay">
      <div class="sidebar-name">~/$ CYBERDACH</div>

      <!-- 🖥️ TERMINAL LOGO (NEW) -->
      <div class="terminal-logo">
        <div class="prompt-line">┌─[<span class="user">cyberdach</span><span class="prompt-line">@</span><span class="host">web</span>]──[<span class="path">~</span>]</div>
        <div class="prompt-line" style="margin-top:5px;">└──╼ $ <span class="cursor-block">█</span></div>
      </div>

      <div class="left-links">
        <a href="mailto:cyberdachh@proton.me" title="Email">📧</a>
        <a href="https://linkedin.com/in/dachelakyerefi" target="_blank" title="LinkedIn">in</a>
        <a href="https://github.com/dach-a" target="_blank" title="GitHub">⎔</a>
      </div>
    </div>
    <div class="scroll-quote-container">
      <p class="scroll-quote">"Fetching inspiration..."</p>
    </div>
  </div>

  <!-- ========== RIGHT PANEL (DYNAMIC SPA) ========== -->
  <div class="right_panel">
    <nav class="top-nav">
      <span class="nav-link" data-route="home">Home</span>
      <span class="nav-link" data-route="projects">Projects</span>
      <span class="nav-link" data-route="stack">Stack</span>
      <span class="nav-link" data-route="about">About</span>
    </nav>

    <!-- View container -->
    <div id="view-container" class="fade-transition">
      <!-- Content will be injected here by router -->
    </div>
  </div>
</div>

<script>
  (function(){
    "use strict";

    /* ---------- THREE.JS PARTICLES (unchanged) ---------- */
    (function initThree() {
      const canvas = document.getElementById('three-canvas');
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(60, 1, 0.1, 1000);
      camera.position.z = 80;
      const resize = () => {
        const w = canvas.parentElement.clientWidth;
        const h = canvas.parentElement.clientHeight;
        renderer.setSize(w, h, false);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
      };
      resize();
      window.addEventListener('resize', resize);
      const COUNT = 120;
      const positions = new Float32Array(COUNT * 3);
      const vels = [];
      for (let i=0; i<COUNT; i++) {
        positions[i*3]   = (Math.random()-0.5)*120;
        positions[i*3+1] = (Math.random()-0.5)*120;
        positions[i*3+2] = (Math.random()-0.5)*40;
        vels.push({ x:(Math.random()-0.5)*0.06, y:(Math.random()-0.5)*0.06 });
      }
      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      const mat = new THREE.PointsMaterial({ color: 0xffffff, size: 1.1, transparent: true, opacity: 0.55 });
      const points = new THREE.Points(geo, mat);
      scene.add(points);
      const lineMat = new THREE.LineBasicMaterial({ color: 0xeb2632, transparent: true, opacity: 0.12 });
      const lineGeo = new THREE.BufferGeometry();
      const linePositions = new Float32Array(COUNT * COUNT * 6);
      lineGeo.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));
      const lines = new THREE.LineSegments(lineGeo, lineMat);
      scene.add(lines);
      let mx=0, my=0;
      document.querySelector('.left_panel').addEventListener('mousemove', e => {
        const r = e.currentTarget.getBoundingClientRect();
        mx = ((e.clientX - r.left) / r.width  - 0.5)*2;
        my = ((e.clientY - r.top)  / r.height - 0.5)*2;
      });
      const THRESH = 35;
      let frame = 0;
      function animate() {
        requestAnimationFrame(animate);
        frame++;
        const pos = geo.attributes.position.array;
        for (let i=0; i<COUNT; i++) {
          pos[i*3]   += vels[i].x;
          pos[i*3+1] += vels[i].y;
          if (Math.abs(pos[i*3])>60) vels[i].x*=-1;
          if (Math.abs(pos[i*3+1])>60) vels[i].y*=-1;
        }
        geo.attributes.position.needsUpdate = true;
        if (frame%2===0) {
          let lIdx=0;
          const lp = lineGeo.attributes.position.array;
          for (let a=0; a<COUNT; a++) {
            for (let b=a+1; b<COUNT; b++) {
              const dx = pos[a*3]-pos[b*3];
              const dy = pos[a*3+1]-pos[b*3+1];
              const dz = pos[a*3+2]-pos[b*3+2];
              if (Math.sqrt(dx*dx+dy*dy+dz*dz) < THRESH) {
                lp[lIdx++] = pos[a*3]; lp[lIdx++] = pos[a*3+1]; lp[lIdx++] = pos[a*3+2];
                lp[lIdx++] = pos[b*3]; lp[lIdx++] = pos[b*3+1]; lp[lIdx++] = pos[b*3+2];
              }
            }
          }
          lineGeo.setDrawRange(0, lIdx/3);
          lineGeo.attributes.position.needsUpdate = true;
        }
        camera.position.x += (mx*4 - camera.position.x)*0.04;
        camera.position.y += (-my*4 - camera.position.y)*0.04;
        camera.lookAt(0,0,0);
        renderer.render(scene, camera);
      }
      animate();
    })();

    /* ---------- ROTATING QUOTE (unchanged) ---------- */
    const quoteEl = document.querySelector('.scroll-quote');
    async function fetchQuote() {
      try {
        const res = await fetch(`https://api.quotable.io/random?tags=technology,famous-quotes&maxLength=120&_=${Date.now()}`);
        const data = await res.json();
        if (!data || !data.content) throw new Error();
        quoteEl.classList.add('scroll-out');
        setTimeout(() => {
          quoteEl.classList.remove('scroll-out');
          quoteEl.textContent = `"${data.content}" — ${data.author}`;
          quoteEl.classList.add('scroll-in');
        }, 500);
      } catch {
        quoteEl.textContent = '"Great minds discuss ideas." — Eleanor Roosevelt';
      }
    }
    fetchQuote();
    setInterval(fetchQuote, 45000);

    /* ---------- SPA ROUTER & VIEWS ---------- */
    const container = document.getElementById('view-container');
    const navLinks = document.querySelectorAll('.nav-link');

    // Simple state
    let currentRoute = 'home';
    let projectsCache = null;

    // Helper to render view and update active link
    function navigate(route) {
      currentRoute = route;
      window.location.hash = route;
      renderView(route);
      updateActiveLink(route);
    }

    function updateActiveLink(route) {
      navLinks.forEach(link => {
        link.classList.toggle('active', link.dataset.route === route);
      });
    }

    // ----- VIEW TEMPLATES -----
    function renderHome() {
      return `
        <section class="hero-content">
          <div class="section-label">~/$ whoami</div>
          <h1><strong>Dachel Akyerefi</strong> is a software engineer focused on designing high‑performance APIs and building scalable web applications.</h1>
          <div class="metadata-grid">
            <div class="meta-item"><h3>Location</h3><p>Accra, Ghana</p></div>
            <div class="meta-item"><h3>Education</h3><p>MSc. Cybersecurity<br>BSc. Telecoms</p></div>
            <div class="meta-item"><h3>Focus</h3><p>Full‑Stack · Security · Cloud</p></div>
          </div>
          <div class="bio-text">
            <p>Welcome! Please make yourself at home.</p>
            <p>I have spent the last 5 years building and maintaining production‑ready MERN stack applications. Right now, I'm focused on building auto‑cooldown AI for data engineering and developing scalable CMS platforms for institutional clients.</p>
            <p>Feel free to browse <a href="https://github.com/dach-a" target="_blank">my projects</a>, or learn more <a href="#about">about me</a>.</p>
          </div>
        </section>
      `;
    }

    async function renderProjects() {
      if (!projectsCache) {
        try {
          const res = await fetch('https://api.github.com/users/dach-a/repos?sort=updated&per_page=12');
          projectsCache = await res.json();
        } catch {
          projectsCache = [];
        }
      }
      const repos = projectsCache || [];
      const cards = repos.map(repo => {
        const lang = repo.language || '';
        const stars = repo.stargazers_count;
        const desc = repo.description || 'No description.';
        return `
          <a class="project-card" href="${repo.html_url}" target="_blank" rel="noopener">
            <div style="display:flex; justify-content:space-between;">
              <span>📦 ${repo.name}</span>
              <span>⭐ ${stars}</span>
            </div>
            <div style="font-size:0.8rem; margin:0.5rem 0; color:#666;">${desc.substring(0,90)}…</div>
            <div><span class="skill-tag" style="font-size:0.65rem;">${lang || 'code'}</span></div>
          </a>
        `;
      }).join('');
      return `
        <section>
          <div class="section-label">~/github repos</div>
          <div class="projects-grid">
            ${cards || '<p>No repositories found.</p>'}
          </div>
        </section>
      `;
    }

    function renderStack() {
      return `
        <section>
          <div class="section-label">~/tech stack</div>
          <div><strong>Core:</strong> JavaScript, TypeScript, Python, PHP, C++</div>
          <div class="skill-tags">
            <span class="skill-tag">React</span><span class="skill-tag">Next.js</span><span class="skill-tag">Node.js</span>
            <span class="skill-tag">MongoDB</span><span class="skill-tag">Tailwind</span><span class="skill-tag">Docker</span>
            <span class="skill-tag">AWS</span><span class="skill-tag">Firebase</span><span class="skill-tag">OWASP</span>
          </div>
          <div style="margin-top:2rem;"><strong>Specialties:</strong> Cybersecurity, Digital Forensics, AI Anomaly Detection, Payment Integration</div>
        </section>
      `;
    }

    function renderAbout() {
      return `
        <section>
          <div class="section-label">~/about</div>
          <div class="bio-text">
            <p>Software Engineer with 5+ years of professional experience designing high‑performance APIs and secure web applications. My background in Cybersecurity and Digital Forensics enables a "security‑first" approach.</p>
            <p><strong>Professional Focus:</strong> MERN stack, real‑time e‑commerce, containerisation (Docker), and supply chain security research.</p>
            <p>Open to collaborating on challenging tech projects — <a href="mailto:cyberdachh@proton.me">get in touch →</a></p>
          </div>
          <div class="stats-grid" style="margin-top:2rem;">
            <div class="stat-img"><img src="https://github-readme-stats.vercel.app/api?username=dach-a&show_icons=true&theme=radical&hide_border=true" loading="lazy"></div>
            <div class="stat-img"><img src="https://github-readme-streak-stats.herokuapp.com/?user=dach-a&theme=radical&hide_border=true" loading="lazy"></div>
            <div class="stat-img" style="grid-column:1/-1"><img src="https://github-readme-stats.vercel.app/api/top-langs/?username=dach-a&layout=compact&theme=radical&hide_border=true" loading="lazy"></div>
          </div>
        </section>
      `;
    }

    async function renderView(route) {
      let html = '';
      switch(route) {
        case 'home':     html = renderHome(); break;
        case 'projects': html = await renderProjects(); break;
        case 'stack':    html = renderStack(); break;
        case 'about':    html = renderAbout(); break;
        default:         html = renderHome();
      }
      container.innerHTML = html;
    }

    // Handle navigation clicks
    navLinks.forEach(link => {
      link.addEventListener('click', e => {
        e.preventDefault();
        const route = link.dataset.route;
        navigate(route);
      });
    });

    // Initial load based on hash or default
    function initRouter() {
      const hash = window.location.hash.slice(1) || 'home';
      navigate(hash);
      window.addEventListener('hashchange', () => {
        const newRoute = window.location.hash.slice(1) || 'home';
        if (newRoute !== currentRoute) {
          navigate(newRoute);
        }
      });
    }
    initRouter();

    // Make internal hash links work (like "about me" link in home)
    document.addEventListener('click', e => {
      if (e.target.tagName === 'A' && e.target.getAttribute('href')?.startsWith('#')) {
        e.preventDefault();
        const route = e.target.getAttribute('href').slice(1);
        navigate(route);
      }
    });

  })();
</script>
</body>
</html>
